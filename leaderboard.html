<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLTA | ARENA RANG LISTA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-dark: #05050a;
            --gold: #ffd700;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #05050a 100%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 15px 80px 15px; /* Padding dole zbog palca */
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            padding: 20px 0 30px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .refresh-info {
            font-size: 0.7rem;
            color: var(--neon-cyan);
            opacity: 0.5;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Stilovi tabele */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        .player-card:active {
            transform: scale(0.98); /* Vizuelni feedback na dodir */
            background: rgba(255, 255, 255, 0.08);
        }

        .rank {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            width: 45px;
            text-align: center;
        }

        .name-section {
            flex-grow: 1;
            padding-left: 10px;
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: block;
        }

        .score-section {
            text-align: right;
        }

        .score-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--neon-magenta);
            font-weight: bold;
        }

        /* Top 3 Specijalni stilovi */
        .top-1 { border-left: 4px solid var(--gold); background: rgba(255, 215, 0, 0.05); }
        .top-1 .rank { color: var(--gold); font-size: 1.5rem; }
        
        .top-2 { border-left: 4px solid var(--silver); }
        .top-2 .rank { color: var(--silver); }

        .top-3 { border-left: 4px solid var(--bronze); }
        .top-3 .rank { color: var(--bronze); }

        .other-ranks .rank { color: var(--neon-cyan); opacity: 0.6; }

        /* Dugme za osvežavanje */
        .fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan);
            border: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TOP 50 ARENA</h1>
        <div class="refresh-info">Povuci nadole za osvežavanje</div>
    </div>

    <div id="lista-telo" class="leaderboard-list">
        </div>
</div>

<button class="fab" onclick="fetchRankings()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
</button>

<script>
    async function fetchRankings() {
        try {
            const response = await fetch('/api/rang-lista');
            const data = await response.json();
            
            let html = "";
            data.forEach((igrac, index) => {
                let topClass = "";
                if(index === 0) topClass = "top-1";
                else if(index === 1) topClass = "top-2";
                else if(index === 2) topClass = "top-3";
                else topClass = "other-ranks";

                html += `
                    <div class="player-card ${topClass}">
                        <div class="rank">${index + 1}</div>
                        <div class="name-section">
                            <span class="player-name">${igrac.prikaz_imena}</span>
                        </div>
                        <div class="score-section">
                            <span class="score-val">${igrac.finalni_skor}</span>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('lista-telo').innerHTML = html || "<p style='text-align:center'>Nema rezultata.</p>";
        } catch (err) {
            console.error("Greška:", err);
        }
    }

    // Učitaj odmah
    fetchRankings();
    
    // Automatsko osvežavanje svakih 60 sekundi (manje agresivno za mob)
    setInterval(fetchRankings, 60000);
</script>

</body>
</html>
