<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLTA | ARENA RANG LISTA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-dark: #05050a;
            --gold: #ffd700;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #05050a 100%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 15px 80px 15px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            padding: 10px 0 20px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- STIL ZA PRETRAGU --- */
        .search-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex-grow: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Rajdhani';
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus { border-color: var(--neon-cyan); }

        .search-btn {
            background: var(--neon-cyan);
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            cursor: pointer;
        }

        #searchResult {
            margin-top: 15px;
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        /* --- STIL LISTE --- */
        .leaderboard-list { display: flex; flex-direction: column; gap: 10px; }

        .player-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        .rank { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: bold; width: 45px; text-align: center; }
        .name-section { flex-grow: 1; padding-left: 10px; }
        .player-name { font-size: 1.1rem; font-weight: 600; display: block; }
        .score-section { text-align: right; }
        .score-val { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--neon-magenta); font-weight: bold; }

        .top-1 { border-left: 4px solid var(--gold); background: rgba(255, 215, 0, 0.05); }
        .top-1 .rank { color: var(--gold); }
        .top-2 { border-left: 4px solid var(--silver); }
        .top-2 .rank { color: var(--silver); }
        .top-3 { border-left: 4px solid var(--bronze); }
        .top-3 .rank { color: var(--bronze); }
        .other-ranks .rank { color: var(--neon-cyan); opacity: 0.6; }

        .fab {
            position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px;
            background: var(--neon-cyan); border-radius: 50%; display: flex;
            justify-content: center; align-items: center; box-shadow: 0 0 15px var(--neon-cyan);
            border: none; z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TOP 50 ARENA</h1>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="email" id="searchEmail" class="search-input" placeholder="Tvoj email za istoriju...">
            <button onclick="pretraziIgraca()" class="search-btn">TRAŽI</button>
        </div>
        <div id="searchResult"></div>
    </div>

    <div id="lista-telo" class="leaderboard-list">
        </div>
</div>

<button class="fab" onclick="fetchRankings()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
</button>

<script>
    // 1. GLOBALNA RANG LISTA (TOP 50)
    async function fetchRankings() {
        try {
            const response = await fetch('/api/rang-lista');
            const data = await response.json();
            let html = "";
            data.forEach((igrac, index) => {
                let topClass = index === 0 ? "top-1" : index === 1 ? "top-2" : index === 2 ? "top-3" : "other-ranks";
                html += `
                    <div class="player-card ${topClass}">
                        <div class="rank">${index + 1}</div>
                        <div class="name-section"><span class="player-name">${igrac.prikaz_imena}</span></div>
                        <div class="score-section"><span class="score-val">${igrac.finalni_skor}</span></div>
                    </div>`;
            });
            document.getElementById('lista-telo').innerHTML = html || "<p style='text-align:center'>Nema rezultata.</p>";
        } catch (err) { console.error(err); }
    }

    // 2. PRETRAGA POJEDINAČNOG IGRAČA I ISTORIJA
    async function pretraziIgraca() {
        const email = document.getElementById('searchEmail').value.trim();
        const resDiv = document.getElementById('searchResult');
        if (!email) return;

        resDiv.style.display = "block";
        resDiv.innerHTML = "<p style='text-align:center; font-size:0.8rem;'>Pretražujem...</p>";

        try {
            const response = await fetch(`/api/pronadji-me?email=${encodeURIComponent(email)}`);
            const data = await response.json();

            if (data.pronadjen) {
                let istorijaHtml = data.istorija.map(r => {
                    const d = new Date(r.created_at);
                    const datum = d.toLocaleDateString('sr-RS') + " " + d.toLocaleTimeString('sr-RS', {hour:'2-digit', minute:'2-digit'});
                    return `<div class="history-item"><span style="opacity:0.6">${datum}</span><span style="color:var(--neon-cyan); font-weight:bold">${r.finalni_skor}</span></div>`;
                }).join('');

                resDiv.innerHTML = `
                    <div style="text-align:center; margin-bottom:15px;">
                        <div style="font-size:0.7rem; opacity:0.6; letter-spacing:1px;">NAJBOLJI RANG:</div>
                        <div style="font-family:'Orbitron'; color:var(--neon-magenta); font-size:1.8rem;">#${data.najbolja_pozicija}</div>
                    </div>
                    <div style="max-height:180px; overflow-y:auto; padding-right:5px;">
                        <div style="font-size:0.6rem; opacity:0.4; margin-bottom:5px; text-transform:uppercase;">Istorija igara (najnovije prvo):</div>
                        ${istorijaHtml}
                    </div>`;
            } else {
                resDiv.innerHTML = "<p style='text-align:center; color:red; font-size:0.8rem;'>Email nije pronađen.</p>";
            }
        } catch (err) { resDiv.innerHTML = "Greška u konekciji."; }
    }

    fetchRankings();
    setInterval(fetchRankings, 60000);
</script>

</body>
</html>
