<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Arena | Prijava</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%; max-width: 400px;
            background: var(--card-bg);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222; text-align: center;
        }

        .logo {
            font-size: 2.8rem; font-weight: 800;
            color: var(--neon-green); margin-bottom: 5px;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        h2 { font-size: 1rem; margin-bottom: 25px; color: #aaa; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label {
            display: block; margin-bottom: 8px; font-size: 0.8rem;
            color: var(--neon-green); font-weight: bold; text-transform: uppercase;
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 2px solid #333; background: #000; color: #fff;
            font-size: 1rem; box-sizing: border-box; transition: all 0.3s;
        }

        input:focus { outline: none; border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        .btn-start {
            width: 100%; padding: 18px; background: var(--neon-green);
            color: #000; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            margin-top: 10px; text-transform: uppercase;
            transition: transform 0.1s, background 0.3s;
        }

        .btn-start:active { transform: scale(0.96); }

        #status {
            margin-top: 20px; font-size: 1.2rem; font-weight: bold;
            min-height: 30px; line-height: 1.4;
        }

        .countdown-num {
            font-size: 4rem; color: var(--neon-green);
            display: block; margin-top: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .info-box {
            margin-top: 30px; padding: 15px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 12px; border: 1px dashed #333;
        }

        .info-box p { margin: 0; font-size: 0.85rem; color: #888; line-height: 1.5; }
        .highlight { color: var(--neon-green); font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="logo">VOLTA</div>
    <h2 id="sub-title">Prijava za turnir</h2>

    <div id="form-ui">
        <div class="input-group">
            <label>E-mail adresa</label>
            <input type="email" id="email" placeholder="vas@mail.com" required>
        </div>

        <div class="input-group">
            <label>PFR Broj (zadnje cifre iz 3. reda)</label>
            <input type="text" id="pfr" placeholder="Npr. 123456" inputmode="numeric">
        </div>

        <button class="btn-start" id="startBtn" onclick="pokreniAparat()">POKRENI APARAT</button>
    </div>

    <div id="status"></div>

    <div class="info-box" id="info-box">
        <p>⚠️ Račun obavezno <span class="highlight">sačuvajte kao dokaz</span> radi preuzimanja nagrade ukoliko osvojite turnir!</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const aparatId = urlParams.get('aparat') || "APARAT_1";

    // Automatski popuni email ako je igrač već igrao na ovom telefonu
    window.onload = () => {
        const savedEmail = localStorage.getItem('volta_email');
        if (savedEmail) document.getElementById('email').value = savedEmail;
    };

    function pokreniAparat() {
        const email = document.getElementById('email').value.trim();
        const pfr = document.getElementById('pfr').value.trim();
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('startBtn');

        if (!email.includes('@')) {
            alert("Unesite ispravan email.");
            return;
        }
        if (pfr.length < 4) {
            alert("Unesite poslednje cifre PFR broja (minimum 4 cifre).");
            return;
        }

        // Sačuvaj email za sledeći put
        localStorage.setItem('volta_email', email);

        btn.disabled = true;
        btn.style.opacity = "0.5";
        statusDiv.innerHTML = "⏳ Proveravam račun...";

        fetch('/skeniraj', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, tiketId: pfr, aparatId })
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                pokreniOdbrojavanje();
            } else {
                statusDiv.innerHTML = "❌ " + (res.message || "Greška!");
                statusDiv.style.color = "#ff4444";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        })
        .catch(() => {
            statusDiv.innerHTML = "❌ Greška na serveru.";
            btn.disabled = false;
            btn.style.opacity = "1";
        });
    }

    function pokreniOdbrojavanje() {
        let sekunde = 10;
        const statusDiv = document.getElementById('status');
        
        // Sakrij elemente forme da se fokusira na odbrojavanje
        document.getElementById('form-ui').classList.add('hidden');
        document.getElementById('info-box').classList.add('hidden');
        document.getElementById('sub-title').classList.add('hidden');
        
        const interval = setInterval(() => {
            statusDiv.innerHTML = `Vaša igra počinje za:<br><span class="countdown-num">${sekunde}</span><br>Srećno! 🎮`;
            sekunde--;

            if (sekunde < 0) {
                clearInterval(interval);
                statusDiv.innerHTML = "<span class='countdown-num' style='font-size: 3rem;'>KRENI!</span>";
            }
        }, 1000);
    }
</script>

</body>
</html>
