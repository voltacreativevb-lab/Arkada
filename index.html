<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Scanner Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .scanner-wrapper { position: relative; width: 100vw; height: 100vh; }
        
        /* Video preko celog ekrana */
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* Vizir za fokus */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            pointer-events: none;
        }
        .guide-box {
            width: 260px; height: 260px; border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); border-radius: 10px;
            position: relative; margin-top: 15vh;
        }
        .laser {
            position: absolute; width: 100%; height: 2px; background: red;
            top: 50%; box-shadow: 0 0 8px red; animation: move 2s infinite linear;
        }
        @keyframes move { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        /* Donji panel */
        .ui-panel {
            width: 100%; background: rgba(18, 18, 18, 0.9); padding: 20px;
            border-top: 2px solid #00ff88; pointer-events: all; box-sizing: border-box;
        }
        input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-size: 16px; margin-bottom: 10px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 16px; background: #00ff88; color: #000;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px;
        }
        #status { margin-bottom: 10px; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>

<div class="scanner-wrapper">
    <video id="video"></video>
    
    <div class="overlay">
        <div class="guide-box"><div class="laser"></div></div>
        
        <div class="ui-panel">
            <div id="status">Približite fiskalni račun (20cm)</div>
            <input type="email" id="email" placeholder="Unesite Vaš E-mail">
            <input type="text" id="manual-pfr" placeholder="Zadnja 4 broja PFR-a (opciono)">
            <button class="btn" onclick="manualStart()">AKTIVIRAJ ODMAH</button>
        </div>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserQRCodeReader();
    const videoElement = document.getElementById('video');
    const status = document.getElementById('status');
    const urlParams = new URLSearchParams(window.location.search);
    const aparatId = urlParams.get('aparat') || "APARAT_1";

    // POKRETANJE KAMERE SA MAX PERFORMANSAMA
    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
        if (result) {
            if (navigator.vibrate) navigator.vibrate(150);
            processData(result.text);
        }
    });

    function manualStart() {
        const pfr = document.getElementById('manual-pfr').value.trim();
        if (pfr.length < 4) return alert("Unesite bar 4 broja!");
        processData(pfr);
    }

    function processData(tiketId) {
        const email = document.getElementById('email').value;
        if (!email.includes('@')) return alert("Unesite ispravan email!");

        status.innerText = "⏳ PROVERA U TOKU...";
        
        const ruta = tiketId.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
        
        fetch(ruta, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, [ruta === '/skeniraj' ? 'tiketId' : 'url']: tiketId, aparatId })
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                status.innerText = "✅ USPEH! APARAT RADI!";
                status.style.color = "#00ff88";
            } else {
                status.innerText = "❌ " + res.message;
                status.style.color = "#ff4444";
            }
        })
        .catch(() => status.innerText = "❌ Greška na serveru");
    }
</script>
</body>
</html>
