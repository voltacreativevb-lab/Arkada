<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava Tiketa | Volta ARKADA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        .container { max-width: 500px; margin: auto; padding-top: 20px; }
        h2 { color: #00ff88; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .instructions { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        /* Popravljen prikaz kamere */
        #reader { 
            width: 100%; 
            border: 2px solid #333; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 0 20px rgba(0,255,136,0.1); 
        }
        #reader video {
            object-fit: cover !important; /* Puni ekran */
        }
        
        .input-group { margin: 20px 0; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; line-height: 1.5; position: relative; }
        
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 10px auto;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .success { background: #004422; color: #00ff88; display: block !important; border: 1px solid #00ff88; }
        .error { background: #440000; color: #ff4444; display: block !important; border: 1px solid #ff4444; }
        .loading { background: #1a1a1a; color: #fff; display: block !important; border: 1px solid #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚡ Volta ARKADA</h2>
        <p class="instructions">Udaljite telefon oko 20cm i sačekajte fokus</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Vaš Email (za potvrdu popusta)" required>
        </div>

        <div id="reader"></div>
        
        <div id="status">
            <div class="loading-content">
                <div class="spinner" id="statusSpinner"></div>
                <span id="statusText">⏳ Provera...</span>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mojAparat = urlParams.get('aparat') || "APARAT_1";

        const html5QrCode = new Html5Qrcode("reader");
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const statusSpinner = document.getElementById('statusSpinner');

        const onScanSuccess = (decodedText, decodedResult) => {
            const email = document.getElementById('email').value;
            
            if(!email || !email.includes('@')) {
                alert("Greška: Morate uneti ispravan Email pre skeniranja!");
                return;
            }

            html5QrCode.pause(true); 
            statusDiv.className = "loading";
            statusDiv.style.display = "block";
            statusSpinner.style.display = "block";

            let targetRoute = '/skeniraj';
            let bodyData = { email: email, tiketId: decodedText, aparatId: mojAparat };

            if (decodedText.includes("suf.purs.gov.rs")) {
                targetRoute = '/procesuiraj-racun';
                bodyData = { email: email, url: decodedText };
                statusText.innerText = "🔍 Čitanje PFR broja sa Poreske... (par sekundi)";
            } else {
                statusText.innerText = "⏳ Aktivacija uređaja...";
            }

            fetch(targetRoute, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            })
            .then(async res => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Greška na serveru");
                return data;
            })
            .then(data => {
                statusSpinner.style.display = "none";
                statusDiv.className = "success";
                if (targetRoute === '/procesuiraj-racun') {
                    statusText.innerHTML = `✅ RAČUN PRIHVAĆEN!<br>PFR: ${data.pfr}<br>Uređaj spreman!`;
                } else {
                    statusText.innerHTML = "✅ TIKET PRIHVAĆEN!<br>Srećno!";
                }
            })
            .catch(err => {
                statusSpinner.style.display = "none";
                statusDiv.className = "error";
                statusText.innerHTML = "❌ " + err.message;
                setTimeout(() => {
                    statusDiv.style.display = "none";
                    html5QrCode.resume();
                }, 4000);
            });
        };

        // KONFIGURACIJA KOJA "UBIJA"
        const config = { 
            fps: 30, // Brži frejmrejt
            qrbox: { width: 300, height: 200 }, // Širi okvir za fiskalne račune
            aspectRatio: 1.0,
            // FORSIRANJE HD REZOLUCIJE ZA BOLJI FOKUS
            videoConstraints: {
                facingMode: "environment",
                width: { min: 1280, ideal: 1920, max: 2560 },
                height: { min: 720, ideal: 1080, max: 1440 },
                focusMode: "continuous"
            }
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            statusDiv.className = "error";
            statusDiv.style.display = "block";
            statusText.innerText = "Kamera nije dostupna.";
        });
    </script>
</body>
</html>
