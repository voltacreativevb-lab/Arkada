<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLTA Pro Kontrola</title>
    <!-- Učitavamo zvanični Supabase JS klijent sa interneta -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #070708;
            --card-bg: #121214;
            --card-border: #1f1f23;
            --accent-orange: #ff5722;
            --accent-green: #00e676;
            --text-main: #ffffff;
            --text-muted: #62626a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 90vh;
        }

        .container { 
            width: 100%; max-width: 380px; 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            padding: 30px 20px; border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.5px; margin: 0 0 5px 0; text-transform: uppercase; }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        /* INPUT POLJA ZA LOGIN */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        .input-field { width: 100%; padding: 14px; background: #18181c; border: 1px solid var(--card-border); border-radius: 12px; color: white; font-size: 1rem; box-sizing: border-box; }
        .input-field:focus { outline: none; border-color: var(--accent-orange); }

        /* DIGMAD */
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s ease; }
        .btn:active { transform: scale(0.98); }
        .btn-orange { background: var(--accent-orange); color: white; box-shadow: 0 6px 20px rgba(255, 87, 34, 0.3); }
        .btn-orange:disabled { background: #33221c; color: var(--text-muted); box-shadow: none; cursor: not-allowed; }

        /* KARTICE ZA SELEKCIJU 3 IGRE */
        .games-grid { display: flex; flex-direction: column; gap: 12px; margin: 25px 0; }
        .game-card { background: #18181c; border: 1px solid var(--card-border); padding: 16px; border-radius: 14px; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .game-card.active { border-color: var(--accent-orange); background: rgba(255, 87, 34, 0.04); }
        .game-info h3 { margin: 0; font-size: 1.05rem; font-weight: 700; }
        .game-info p { margin: 4px 0 0 0; font-size: 0.8rem; color: var(--text-muted); }
        .badge { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; background: #26262b; border-radius: 6px; color: #aaa; }
        .game-card.active .badge { background: var(--accent-orange); color: white; }

        /* STATUSNA BAR-A */
        .status-box { background: #18181c; border: 1px solid var(--card-border); padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-top: 20px; color: #aaa; }
        .status-dot { inline-size: 8px; block-size: 8px; background-color: var(--text-muted); border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.online { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }

        /* SAKRIVANJE JEDNOG OD EKRANA */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>VOLTA SYSTEM</h1>
    <div class="subtitle">Aparat: VOLTA_001</div>

    <!-- 1. EKRAN FORMA ZA LOGIN (Prikazuje se prva) -->
    <div id="login-screen">
        <div class="input-group">
            <label>E-mail Adresa</label>
            <input type="email" id="email" class="input-field" placeholder="ime@gmail.com">
        </div>
        <div class="input-group">
            <label>Šifra</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn btn-orange" onclick="ulogujSe()" style="margin-top: 20px;">🚪 PRIJAVI SE</button>
    </div>

    <!-- 2. EKRAN KONTROLNA TABLA (Otključava se nakon logina) -->
    <div id="dashboard-screen" class="hidden">
        <div class="games-grid">
            <!-- IGRA A -->
            <div class="game-card active" id="card-A" onclick="izaberiIgru('A')">
                <div class="game-info">
                    <h3>⚡ REFLEX TEST</h3>
                    <p>Udari svetleći senzor što brže možeš</p>
                </div>
                <div class="badge">IGRA A</div>
            </div>
            <!-- IGRA B -->
            <div class="game-card" id="card-B" onclick="izaberiIgru('B')">
                <div class="game-info">
                    <h3>🔥 SPEED CHALLENGE</h3>
                    <p>Koliko udaraca možeš da spakuješ u 30s?</p>
                </div>
                <div class="badge">IGRA B</div>
            </div>
            <!-- IGRA C -->
            <div class="game-card" id="card-C" onclick="izaberiIgru('C')">
                <div class="game-info">
                    <h3>💪 ENDURANCE MODE</h3>
                    <p>Igraj bez greške dok ritam ubrzava</p>
                </div>
                <div class="badge">IGRA C</div>
            </div>
        </div>

        <button class="btn btn-orange" id="startBtn" onclick="pokreniAparat()">🚀 POKRENI APARAT</button>
        
        <div class="status-box">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Status aparata: Učitavanje...</span>
        </div>
    </div>
</div>

<script>
    // 🔔 UNESI SVOJE SUPABASE PODATKE OVDE!
    const SUPABASE_URL = "https://tvoj-projekat.supabase.co";
    const SUPABASE_ANON_KEY = "tvoj_javni_anon_key_ovde...";
    
    // Inicijalizacija Supabase klijenta
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let trenutnoIzabranaIgra = 'A';
    let trenutniAparat = 'VOLTA_001';
    let ulogovaniKorisnikId = null;

    // Provera da li je korisnik već ulogovan od ranije
    window.onload = async () => {
        const session = supabase.auth.session; // Automatski vuče token ako postoji
        if (session) {
            autorizujKorisnika(session.user.id);
        }
    };

    // FUNKCIJA ZA LOGIN
    async function ulogujSe() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Greška pri prijavi: " + error.message);
        } else {
            autorizujKorisnika(data.user.id);
        }
    }

    function autorizujKorisnika(userId) {
        ulogovaniKorisnikId = userId;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        pratiStatusAparataUživo();
    }

    // IZBOR IZMEĐU 3 IGRE U INTERFEJSU
    function izaberiIgru(oznaka) {
        trenutnoIzabranaIgra = oznaka;
        document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
        document.getElementById('card-' + oznaka).classList.add('active');
    }

    // 🚀 GLAVNA INTERNET KOMANDA: Šaljemo signal aparatu preko Supabase-a
    async function pokreniAparat() {
        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        startBtn.innerText = "SLANJE SIGNALA...";

        const { error } = await supabase
            .from('aparati_status')
            .update({ 
                status: 'POKRENI_IGRU', 
                trenutni_korisnik: ulogovaniKorisnikId,
                izabrana_igra: trenutnoIzabranaIgra
            })
            .eq('aparat_id', trenutniAparat);

        if (error) {
            alert("Greška na mreži: " + error.message);
            startBtn.disabled = false;
            startBtn.innerText = "🚀 POKRENI APARAT";
        }
    }

    // 🔄 REALTIME OSLUŠKIVANJE STATUS APARATA
    // Telefon prati šta aparat javlja bazi, i menja izgled ekrana u skladu sa tim
    function pratiStatusAparataUživo() {
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const startBtn = document.getElementById('startBtn');

        // Supabase Realtime pretplata na izmene u tabeli aparati_status
        supabase
            .channel('status_promene')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'aparati_status', filter: `aparat_id=eq.${trenutniAparat}` }, payload => {
                const noviStatus = payload.new.status;
                
                if (noviStatus === 'SLOBODAN') {
                    statusText.innerText = "Status aparata: Slobodan za igru";
                    statusDot.className = "status-dot online";
                    startBtn.disabled = false;
                    startBtn.innerText = "🚀 POKRENI APARAT";
                } else if (noviStatus === 'POKRENI_IGRU') {
                    statusText.innerText = "Status aparata: Pokretanje hardvera...";
                    statusDot.className = "status-dot";
                    startBtn.disabled = true;
                } else if (noviStatus === 'IGRA_U_TOKU') {
                    statusText.innerText = "Status aparata: IGRA U TOKU! 🎯";
                    statusDot.className = "status-dot";
                    startBtn.disabled = true;
                    startBtn.innerText = "IGRAŠ...";
                }
            })
            .subscribe();

        // Prvo (ručno) učitavanje statusa čim se uđe na ekran
        osveziStatusNaStartu();
    }

    async function osveziStatusNaStartu() {
        const { data } = await supabase.from('aparati_status').select('status').eq('aparat_id', trenutniAparat).single();
        if (data) {
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            if(data.status === 'SLOBODAN') {
                statusText.innerText = "Status aparata: Slobodan za igru";
                statusDot.className = "status-dot online";
            } else {
                statusText.innerText = "Status aparata: Zauzet (" + data.status + ")";
                document.getElementById('startBtn').disabled = true;
            }
        }
    }
</script>
</body>
</html>
