<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava Tiketa</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; border: 2px solid #00ff88; border-radius: 15px; overflow: hidden; }
        .input-group { margin-bottom: 20px; }
        input { width: 85%; padding: 15px; border-radius: 8px; border: none; font-size: 16px; }
        .instructions { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        #status { font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #004422; color: #00ff88; display: block !important; }
        .error { background: #440000; color: #ff4444; display: block !important; }
    </style>
</head>
<body>
    <h2>🎟️ Aktiviraj svoj tiket u Volta ARKADI</h2>
    <p class="instructions">Unesite email i skenirajte barkod sa vašeg tiketa</p>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Vaš Email" required>
    </div>

    <div id="reader"></div>
    <div id="status"></div>

    <script>
        // Konfiguracija skenera da čita i QR i Bar kodove (Code 128, EAN, itd.)
        const html5QrCode = new Html5Qrcode("reader");
        const statusDiv = document.getElementById('status');

        const onScanSuccess = (decodedText, decodedResult) => {
            const email = document.getElementById('email').value;
            
            if(!email || !email.includes('@')) {
                alert("Molimo unesite ispravan email pre skeniranja tiketa!");
                return;
            }

            // Zaustavi kameru da ne skenira više puta isti tiket
            html5QrCode.stop();
            
            statusDiv.className = ""; 
            statusDiv.innerText = "Proveravam tiket: " + decodedText;
            statusDiv.classList.add('success');

            // Šaljemo Email i Barkod Tiketa na tvoj Render
            fetch('/skeniraj', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email, 
                    tiketId: decodedText,
                    aparatId: "APARAT_1" // Ovo možeš menjati po aparatu
                })
            })
            .then(res => res.json())
            .then(data => {
                statusDiv.innerText = "Tiket prihvaćen! Srećno u igri!";
            })
            .catch(err => {
                statusDiv.className = "error";
                statusDiv.innerText = "Greška pri povezivanju sa serverom.";
            });
        };

        // Podešavanja za bolji fokus na barkodove
        const config = { 
            fps: 20, 
            qrbox: { width: 300, height: 150 }, // Pravougaoni oblik je bolji za barkod
            aspectRatio: 1.0 
        };

        // Pokreni kameru (zadnju)
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
