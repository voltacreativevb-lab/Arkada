<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeniraj Račun | Volta ARKADA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        h2 { color: #00ff88; letter-spacing: 2px; }
        .instructions { color: #888; font-size: 14px; margin-bottom: 25px; }

        /* Stil za dugme koje otvara kameru */
        .camera-trigger {
            background: #00ff88; color: #000; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,136,0.4); width: 90%; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .input-group { margin: 20px 0; }
        input[type="email"] { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; }
        
        #status { margin-top: 20px; padding: 20px; border-radius: 15px; font-weight: bold; display: none; }
        .success { background: #004422; color: #00ff88; border: 1px solid #00ff88; }
        .error { background: #440000; color: #ff4444; border: 1px solid #ff4444; }
        .loading { background: #333; color: #fff; }

        /* Nevidljivi input koji zapravo otvara kameru */
        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚡ Volta ARKADA</h2>
        <p class="instructions">Uslikajte fiskalni račun oštro i pod pravim uglom</p>

        <div class="input-group">
            <input type="email" id="email" placeholder="Vaš Email" required>
        </div>

        <label for="file-input" class="camera-trigger">
            📸 USLIKAJ RAČUN
        </label>
        <input type="file" id="file-input" accept="image/*" capture="environment">

        <div id="status">
            <span id="statusText"></span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mojAparat = urlParams.get('aparat') || "APARAT_1";
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');

        // Inicijalizacija skenera u "fajl" modu (ne video)
        const html5QrCode = new Html5Qrcode("status"); // Koristimo bilo koji div

        fileInput.addEventListener('change', e => {
            if (e.target.files.length === 0) return;

            const email = document.getElementById('email').value;
            if(!email || !email.includes('@')) {
                alert("Unesite ispravan Email!");
                fileInput.value = "";
                return;
            }

            const imageFile = e.target.files[0];
            
            // Prikaži loading
            statusDiv.style.display = "block";
            statusDiv.className = "loading";
            statusText.innerText = "⏳ Analiziram sliku... Sačekajte...";

            // SKENIRANJE USLIKANE SLIKE
            html5QrCode.scanFile(imageFile, true)
            .then(decodedText => {
                obradiRezultat(decodedText, email);
            })
            .catch(err => {
                statusDiv.className = "error";
                statusText.innerHTML = "❌ Kod nije prepoznat.<br><small>Pokušajte ponovo, pazite da slika ne bude mutna ili previše tamna.</small>";
                console.error(err);
            });
        });

        function obradiRezultat(decodedText, email) {
            let targetRoute = decodedText.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
            let bodyData = targetRoute === '/procesuiraj-racun' ? { email, url: decodedText } : { email, tiketId: decodedText, aparatId: mojAparat };

            statusText.innerText = "🔍 Verifikacija... (2-3s)";

            fetch(targetRoute, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    statusDiv.className = "success";
                    statusText.innerHTML = `✅ USPEŠNO!<br>PFR: ${data.pfr || "Aktivirano"}<br>Srećno u igri!`;
                } else {
                    throw new Error(data.message);
                }
            })
            .catch(err => {
                statusDiv.className = "error";
                statusText.innerText = "❌ " + err.message;
            });
        }
    </script>
</body>
</html>
