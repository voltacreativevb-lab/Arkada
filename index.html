<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Arena | PIN Prijava</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-green: #00ff88; --dark-bg: #0a0a0a; --card-bg: #161616; --muted: #777; --danger: #ff4a4a; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 2px solid #222; text-align: center; }
        .logo { font-size: 3rem; font-weight: 900; color: var(--neon-green); margin-bottom: 5px; letter-spacing: -2px; text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        h2 { font-size: 0.85rem; margin-bottom: 25px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 0.75rem; color: var(--neon-green); font-weight: 700; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #282828; background: #000; color: #fff; font-size: 1.1rem; text-align: center; }
        input:focus { outline: none; border-color: var(--neon-green); }
        input#pin { letter-spacing: 8px; font-size: 1.3rem; }
        
        .btn-start { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 900; cursor: pointer; text-transform: uppercase; background: var(--neon-green); color: #000; margin-top: 10px; }
        .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .games-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .game-card { background: #0b0b0b; border: 1px solid #222; padding: 14px; border-radius: 12px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .game-card.active { border-color: var(--neon-green); background: rgba(0, 255, 136, 0.03); }
        .game-title { font-weight: 700; margin: 0; }
        .game-desc { font-size: 0.75rem; color: var(--muted); margin: 2px 0 0 0; }
        .badge { font-size: 0.7rem; font-weight: 900; padding: 3px 6px; background: #222; border-radius: 4px; color: #888; }
        .game-card.active .badge { background: var(--neon-green); color: #000; }
        .status-text { margin-top: 15px; font-size: 0.85rem; color: var(--muted); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">VOLTA</div>
    <h2 id="glavni-naslov">Autorizacija Igrača</h2>

    <!-- EKRAN 1: PRIJAVA SA PIN-om -->
    <div id="pin-ui">
        <div class="input-group">
            <label>Unesi svoj Email</label>
            <input type="email" id="email" placeholder="tvoj@email.com" style="text-align: left;">
        </div>
        <div class="input-group">
            <label>Unesi 4-cifreni PIN</label>
            <input type="password" id="pin" maxlength="4" inputmode="numeric" placeholder="••••">
        </div>
        <button class="btn-start" onclick="proveriPin()">POTVRDI PIN</button>
    </div>

    <!-- EKRAN 2: UPRAVLJANJE APARATOM -->
    <div id="dashboard-ui" class="hidden">
        <div class="games-grid">
            <div class="game-card active" id="card-A" onclick="izaberiIgru('A')">
                <div><p class="game-title">⚡ REFLEX TEST</p><p class="game-desc">Udari svetleći taster što brže</p></div>
                <div class="badge">A</div>
            </div>
            <div class="game-card" id="card-B" onclick="izaberiIgru('B')">
                <div><p class="game-title">🔥 SPEED CHALLENGE</p><p class="game-desc">Maksimum udaraca za 30 sekundi</p></div>
                <div class="badge">B</div>
            </div>
            <div class="game-card" id="card-C" onclick="izaberiIgru('C')">
                <div><p class="game-title">💪 ENDURANCE MODE</p><p class="game-desc">Prati ritam koji ubrzava</p></div>
                <div class="badge">C</div>
            </div>
        </div>
        <button class="btn-start" id="startBtn" onclick="pokreniAparat()">🚀 POKRENI APARAT</button>
        <p class="status-text" id="statusTxt">Status: Povezan</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://wdnndorxgdzhlytqkyvh.supabase.co/rest/v1/";
    const SUPABASE_ANON_KEY = "sb_secret_LdQSh7JU6Rz1KDgk6KtT2Q_LsYXYS8f";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const aparatId = urlParams.get('aparat') || "VOLTA_001";

    let izabranaIgra = 'A';
    let korisnikEmail = '';

    // Kad se stranica učita, automatski popuni poslednji korišćeni email
    window.onload = () => {
        const pamtiEmail = localStorage.getItem('volta_memorisan_email');
        if(pamtiEmail) document.getElementById('email').value = pamtiEmail;
    };

    async function proveriPin() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pin = document.getElementById('pin').value.trim();

        if(!email || pin.length !== 4) { alert("Unesi kompletan email i 4 broja PIN-a!"); return; }

        // Provera u bazi da li postoji red gde se poklapaju i email i pin
        const { data, error } = await supabase
            .from('korisnici_pin')
            .select('email')
            .eq('email', email)
            .eq('pin', pin);

        if (error || !data || data.length === 0) {
            alert("Netačan PIN ili Email! Pokušaj ponovo.");
        } else {
            // Uspešna prijava
            korisnikEmail = email;
            localStorage.setItem('volta_memorisan_email', email); // Zapamti za sledeći put
            
            document.getElementById('pin-ui').classList.add('hidden');
            document.getElementById('dashboard-ui').classList.remove('hidden');
            document.getElementById('glavni-naslov').innerText = "Izbor Igre";
            slusajAparatUzivo();
        }
    }

    function izaberiIgru(kod) {
        izabranaIgra = kod;
        document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-' + kod).classList.add('active');
    }

    async function pokreniAparat() {
        document.getElementById('startBtn').disabled = true;
        await supabase
            .from('aparati_status')
            .update({ 
                status: 'POKRENI_IGRU', 
                trenutni_korisnik_email: korisnikEmail, 
                izabrana_igra: izabranaIgra 
            })
            .eq('aparat_id', aparatId);
    }

    function slusajAparatUzivo() {
        supabase
            .channel('aparat_promene')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'aparati_status', filter: `aparat_id=eq.${aparatId}` }, payload => {
                const s = payload.new.status;
                const txt = document.getElementById('statusTxt');
                const btn = document.getElementById('startBtn');

                if(s === 'SLOBODAN') {
                    txt.innerText = "Status: SLOBODAN";
                    btn.disabled = false;
                    btn.innerText = "🚀 POKRENI APARAT";
                } else if(s === 'POKRENI_IGRU') {
                    txt.innerText = "Slanje signala hardveru...";
                } else if(s === 'IGRA_U_TOKU') {
                    txt.innerText = "IGRA JE U TOKU! 🎮";
                    btn.disabled = true;
                    btn.innerText = "IGRA SE...";
                }
            })
            .subscribe();
    }
</script>
</body>
</html>
