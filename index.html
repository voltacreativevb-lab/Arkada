<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Fast Scan</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Vizir (okvir) koji simulira Scanbot osećaj */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
        }
        .scanner-frame {
            width: 280px; height: 280px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px; position: relative;
        }
        .corner { position: absolute; width: 40px; height: 40px; border: 4px solid #00ff88; border-radius: 5px; }
        .tl { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .tr { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .br { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        .laser {
            position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 10px #00ff88; top: 0; animation: scan 2s infinite linear;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        .ui-box {
            position: absolute; bottom: 30px; width: 90%; background: rgba(20,20,20,0.9);
            padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center;
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { font-size: 14px; color: #00ff88; margin-bottom: 5px; }
    </style>
</head>
<body>

    <video id="video"></video>
    
    <div class="overlay">
        <div class="scanner-frame">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            <div class="laser"></div>
        </div>
        
        <div class="ui-box">
            <div id="status">Približite račun...</div>
            <input type="email" id="email" placeholder="E-mail">
            <input type="text" id="manual" placeholder="Zadnja 4 broja PFR-a">
            <button onclick="manualStart()">AKTIVIRAJ RUČNO</button>
        </div>
    </div>

    <script>
        const codeReader = new ZXing.BrowserQRCodeReader();
        const videoElement = document.getElementById('video');
        const status = document.getElementById('status');

        // Forsiranje maksimalnih performansi kamere
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); // Agresivno skeniranje

        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                if (navigator.vibrate) navigator.vibrate(150);
                sendData(result.text);
            }
        }, hints);

        function sendData(text) {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) return alert("Unesite email!");
            
            status.innerText = "⏳ PROVERA...";
            const ruta = text.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
            
            fetch(ruta, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, [ruta === '/skeniraj' ? 'tiketId' : 'url']: text })
            })
            .then(r => r.json())
            .then(res => {
                if(res.success) status.innerText = "✅ USPEH!";
                else status.innerText = "❌ " + res.message;
            })
            .catch(() => status.innerText = "❌ Greška na serveru");
        }

        function manualStart() {
            const val = document.getElementById('manual').value;
            if(val.length < 4) return alert("Unesite bar 4 broja!");
            sendData(val);
        }
    </script>
</body>
</html>
