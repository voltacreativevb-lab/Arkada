<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta name="format-detection" content="telephone=no">
    <title>Volta Arena | Prijava</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%; max-width: 400px;
            background: var(--card-bg);
            padding: 30px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 2px solid #222; text-align: center;
            transition: all 0.5s ease;
        }

        .logo {
            font-size: 3rem; font-weight: 900;
            color: var(--neon-green); margin-bottom: 5px;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        h2 { font-size: 0.9rem; margin-bottom: 30px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label {
            display: block; margin-bottom: 8px; font-size: 0.75rem;
            color: var(--neon-green); font-weight: 700; text-transform: uppercase;
        }

        input {
            width: 100%; padding: 16px; border-radius: 14px;
            border: 2px solid #282828; background: #000; color: #fff;
            font-size: 1.1rem; box-sizing: border-box; transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--neon-green); background: #050505; }

        .btn-start {
            width: 100%; padding: 20px; background: var(--neon-green);
            color: #000; border: none; border-radius: 14px;
            font-size: 1.3rem; font-weight: 900; cursor: pointer;
            margin-top: 10px; text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

        #status-area {
            margin-top: 10px; min-height: 250px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .countdown-num {
            font-size: 6rem; color: var(--neon-green);
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            display: block;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Loader za sabiranje */
        .loader {
            border: 5px solid #222;
            border-top: 5px solid var(--neon-green);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        .mesto-broj {
            font-size: 9rem; font-weight: 900; color: var(--neon-green);
            line-height: 1; margin: 10px 0;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div class="logo">VOLTA</div>
    <h2 id="sub-title">Arena Challenge</h2>

    <div id="form-ui">
        <div class="input-group">
            <label>Identifikacija za rang listu</label>
            <input type="email" id="email" placeholder="tvoj@mail.com" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Kod sa potvrde</label>
            <input type="text" id="pfr_kod" name="user_id_entry" placeholder="Unesi broj ovde" inputmode="numeric" autocomplete="off">
        </div>

        <button class="btn-start" id="startBtn" onclick="autorizujIgru()">POKRENI IGRU</button>
    </div>

    <div id="status-area" class="hidden">
        <div id="status-text" style="font-size: 1.2rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;"></div>
        <div id="countdown-display"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const aparatId = urlParams.get('aparat') || "APARAT_1";

    window.onload = () => {
        const savedEmail = localStorage.getItem('volta_user_email');
        if (savedEmail) document.getElementById('email').value = savedEmail;
    };

    async function autorizujIgru() {
        const email = document.getElementById('email').value.trim();
        const pfr = document.getElementById('pfr_kod').value.trim();
        const btn = document.getElementById('startBtn');

        if (!email.includes('@')) { alert("Unesite ispravan email."); return; }
        if (pfr.length < 3) { alert("Unesite ispravan kod."); return; }

        localStorage.setItem('volta_user_email', email);
        btn.disabled = true;
        btn.innerText = "POVEZIVANJE...";

        try {
            const response = await fetch('/skeniraj', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, tiketId: pfr, aparatId })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('form-ui').classList.add('hidden');
                document.getElementById('sub-title').classList.add('hidden');
                document.getElementById('status-area').classList.remove('hidden');
                
                // Pokrećemo proces sa bar kodom kao parametrom
                startPhoneTimer(pfr);
            } else {
                alert(data.message);
                btn.disabled = false;
                btn.innerText = "POKRENI IGRU";
            }
        } catch (err) {
            alert("Greška na serveru.");
            btn.disabled = false;
        }
    }

    function startPhoneTimer(barcode) {
        const display = document.getElementById('countdown-display');
        const statusText = document.getElementById('status-text');
        let count = 10; 

        statusText.innerText = "POČINJEMO ZA:";

        const interval = setInterval(() => {
            if (count > 0) {
                display.innerHTML = `<span class="countdown-num">${count}</span>`;
                if (count <= 3) {
                    statusText.innerText = "SPREMI SE!!!";
                    statusText.style.color = "var(--neon-green)";
                }
                count--;
            } else {
                clearInterval(interval);
                display.innerHTML = `<span class="countdown-num" style="font-size: 2.5rem; animation: none;">IGRA U TOKU 🎮</span>`;
                statusText.innerText = "SREĆNO!";
                
                if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);

                // Čekamo 35 sekundi da se igra završi na aparatu
                setTimeout(() => {
                    prikaziSabiranje(barcode);
                }, 35000);
            }
        }, 1000);
    }

    function prikaziSabiranje(barcode) {
        const display = document.getElementById('countdown-display');
        const statusText = document.getElementById('status-text');
        
        statusText.innerText = "ZAVRŠENO!";
        statusText.style.color = "#888";
        display.innerHTML = `
            <div class="loader"></div>
            <p style="font-size: 1.2rem; color: var(--neon-green); font-weight: bold;">SABIRAMO BODOVE...</p>
        `;

        // Proveravamo server svake 2 sekunde da li je upisao rezultat
        const proveraInterval = setInterval(async () => {
            try {
                const res = await fetch(`/proveri-rezultat?barcode=${barcode}`);
                const data = await res.json();

                if (data.pronadjen) {
                    clearInterval(proveraInterval);
                    prikaziKonacnoMesto(data.mesto, data.skor);
                }
            } catch (e) {
                console.error("Greška pri proveri rezultata.");
            }
        }, 2000);
    }

    function prikaziKonacnoMesto(mesto, skor) {
        const container = document.getElementById('main-card');
        container.style.borderColor = "var(--neon-green)";
        
        container.innerHTML = `
            <div class="logo">VOLTA</div>
            <h2 style="color: #888; margin-bottom: 10px;">BRAVO!</h2>
            <p style="font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">Osvojio si</p>
            <div class="mesto-broj">${mesto}.</div>
            <p style="font-size: 1.3rem; font-weight: 700; margin-top: -10px;">MESTO</p>
            <p style="color: #666; margin-top: 15px;">Tvoj skor: <span style="color:white">${skor}</span></p>
            <button class="btn-start" onclick="window.location.href='/leaderboard.html'" style="margin-top: 20px;">RANG LISTA</button>
        `;
    }
</script>

</body>
</html>
