<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Scanner</title>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        .video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay sa nišanom */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); pointer-events: none;
        }
        .scanner-box {
            width: 280px; height: 280px; border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.5); position: relative;
        }
        .scanner-box::after {
            content: ''; position: absolute; top: 50%; left: -10%; width: 120%; height: 2px;
            background: #ff0000; box-shadow: 0 0 10px #ff0000; animation: scan 2s infinite;
        }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        /* Donji panel sa unosom */
        .bottom-panel {
            position: absolute; bottom: 0; width: 100%; background: rgba(20,20,20,0.95);
            padding: 20px; border-top: 2px solid #00ff88; pointer-events: all;
            box-sizing: border-box; text-align: center;
        }
        input {
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px;
            border: 1px solid #444; background: #222; color: #fff; font-size: 16px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #00ff88; color: #000; font-weight: bold; font-size: 16px;
        }
        #status { font-size: 14px; margin-bottom: 10px; color: #00ff88; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video"></video>
    <div class="overlay">
        <div style="margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;">Skeniraj QR Kod</div>
        <div class="scanner-box"></div>
        <div class="bottom-panel">
            <div id="status">Centriraj kod u kvadrat</div>
            <input type="email" id="email" placeholder="Tvoj E-mail">
            <input type="text" id="pfr" placeholder="PFR broj (poslednjih 6+ karaktera)">
            <button class="btn" onclick="manualSubmit()">AKTIVIRAJ RUČNO</button>
        </div>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserQRCodeReader();
    const videoElement = document.getElementById('video');
    const urlParams = new URLSearchParams(window.location.search);
    const aparatId = urlParams.get('aparat') || "APARAT_1";

    // POKRETANJE KAMERE
    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
        if (result) {
            console.log("Skenirano:", result.text);
            handleData(result.text);
        }
    });

    function manualSubmit() {
        const manualCode = document.getElementById('pfr').value.trim();
        if (manualCode.length < 4) return alert("Unesite bar 4-6 cifara!");
        handleData(manualCode);
    }

    function handleData(text) {
        const email = document.getElementById('email').value;
        if (!email.includes('@')) return alert("Unesite ispravan e-mail!");

        document.getElementById('status').innerText = "⏳ PROVERA...";

        const ruta = text.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
        
        fetch(ruta, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, [ruta === '/skeniraj' ? 'tiketId' : 'url']: text, aparatId })
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                document.getElementById('status').innerText = "✅ APARAT AKTIVIRAN!";
                document.getElementById('status').style.color = "#00ff88";
            } else {
                document.getElementById('status').innerText = "❌ " + res.message;
                document.getElementById('status').style.color = "#ff4444";
            }
        });
    }
</script>
</body>
</html>
