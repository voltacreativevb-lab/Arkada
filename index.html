<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro | Volta</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* Kamera preko celog gornjeg dela sa overlay-om */
        #reader { width: 100%; height: 65vh; background: #000; position: relative; }
        
        /* Force hardware acceleration */
        #reader video { 
            object-fit: cover !important; 
            transform: translateZ(0); 
            filter: contrast(1.2) brightness(1.1) sharp(1);
        }

        /* Profesionalni nišan (Scanner Overlay) */
        .scanner-viewfinder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border: 2px solid rgba(0, 255, 136, 0.3);
            z-index: 5; pointer-events: none;
        }
        .scanner-viewfinder::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 30px; height: 30px;
            border-top: 4px solid #00ff88; border-left: 4px solid #00ff88;
        }
        .scanner-viewfinder::after {
            content: ''; position: absolute; bottom: -2px; right: -2px; width: 30px; height: 30px;
            border-bottom: 4px solid #00ff88; border-right: 4px solid #00ff88;
        }
        .laser-line {
            position: absolute; width: 100%; height: 2px; background: #00ff88;
            top: 0; left: 0; box-shadow: 0 0 10px #00ff88;
            animation: laserMove 2s infinite linear;
        }
        @keyframes laserMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .control-panel {
            height: 35vh; background: #121212; padding: 20px;
            border-top: 2px solid #00ff88; display: flex; flex-direction: column; gap: 10px;
        }

        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333;
            background: #1a1a1a; color: white; font-size: 16px; outline: none; text-align: center;
        }

        .btn-manual {
            background: #00ff88; color: #000; border: none; padding: 16px;
            border-radius: 12px; font-weight: bold; font-size: 16px; text-transform: uppercase;
        }

        #status { text-align: center; font-weight: bold; min-height: 24px; color: #00ff88; }
        .hint { font-size: 11px; color: #666; text-align: center; margin: 0; }
    </style>
</head>
<body>

    <div id="reader">
        <div class="scanner-viewfinder">
            <div class="laser-line"></div>
        </div>
    </div>

    <div class="control-panel">
        <div id="status">Skenirajte QR kod</div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="manual-pfr" placeholder="Poslednje 4 cifre PFR-a" maxlength="6">
        <button class="btn-manual" onclick="manualAction()">POKRENI RUČNO</button>
        <p class="hint">Centrirajte QR kod u kvadrat i sačekajte fokus</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const aparatId = urlParams.get('aparat') || "APARAT_1";
        const scanner = new Html5Qrcode("reader");

        // PODESAVANJA ZA MAKSIMALNU BRZINU
        const scanConfig = {
            fps: 30, // Brži frejmrejt za glatko praćenje
            qrbox: { width: 260, height: 260 },
            aspectRatio: 1.0,
            // Koristimo Engine koji Google Chrome ima u sebi ako je dostupan
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            },
            videoConstraints: {
                facingMode: "environment",
                focusMode: "continuous",
                // Forsiramo rezoluciju koja je oštra ali ne preteška za procesor
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        const onScanSuccess = (text) => {
            handleProcess(text);
        };

        function manualAction() {
            const code = document.getElementById('manual-pfr').value.trim();
            if(code.length < 4) return alert("Unesite bar 4 cifre!");
            handleProcess(code);
        }

        function handleProcess(tiketId) {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) return alert("Unesite ispravan email!");

            const status = document.getElementById('status');
            status.innerText = "⏳ PROVERA...";
            
            // Logika rute
            const ruta = tiketId.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
            
            fetch(ruta, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, [ruta === '/skeniraj' ? 'tiketId' : 'url']: tiketId, aparatId })
            })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    status.innerText = "✅ APARAT JE AKTIVIRAN!";
                } else {
                    status.style.color = "#ff4444";
                    status.innerText = "❌ " + res.message;
                    setTimeout(() => { status.style.color = "#00ff88"; status.innerText = "Skenirajte QR kod"; }, 3000);
                }
            })
            .catch(() => status.innerText = "❌ Greška na serveru");
        }

        // Auto-start
        scanner.start({ facingMode: "environment" }, scanConfig, onScanSuccess)
        .catch(() => { document.getElementById('status').innerText = "Kamera nedostupna"; });

    </script>
</body>
</html>
