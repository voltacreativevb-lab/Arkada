<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volta Turbo Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; text-align: center; }
        #reader { width: 100%; border: none; background: #000; }
        /* Ulepšavanje vizira */
        #reader__scan_region { background: #000; }
        #reader__dashboard { background: #121212; padding: 10px !important; }
        
        .ui-box { padding: 20px; background: #121212; border-top: 2px solid #00ff88; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; margin-bottom: 10px; font-size: 16px; }
        .btn-manual { background: #00ff88; color: #000; border: none; padding: 15px; width: 90%; border-radius: 10px; font-weight: bold; }
        .status { margin: 10px; font-weight: bold; color: #00ff88; min-height: 20px; }
    </style>
</head>
<body>

    <div id="reader"></div>
    
    <div class="ui-box">
        <div id="status" class="status">Približite QR kod</div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="pfr-last" placeholder="Zadnja 4 broja PFR-a">
        <button class="btn-manual" onclick="manualStart()">AKTIVIRAJ RUČNO</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const urlParams = new URLSearchParams(window.location.search);
        const aparatId = urlParams.get('aparat') || "APARAT_1";

        const config = { 
            fps: 30, // Maksimalno za glatkoću
            qrbox: (viewfinderWidth, viewfinderHeight) => {
                // Dinamički pravougaonik - bolje hvata duge QR kodove na računima
                return { width: 280, height: 180 };
            },
            aspectRatio: 1.0,
            videoConstraints: {
                facingMode: "environment",
                // Forsiramo rezoluciju ali bez preterivanja da ne "laguje"
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                focusMode: "continuous",
                whiteBalanceMode: "continuous"
            }
        };

        const onScanSuccess = (decodedText) => {
            // Vibracija za potvrdu (ako telefon dozvoljava)
            if (navigator.vibrate) navigator.vibrate(100);
            handleData(decodedText);
        };

        function handleData(tiketId) {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) return alert("Unesite email!");

            document.getElementById('status').innerText = "⏳ PROVERA...";
            
            const ruta = tiketId.includes("suf.purs.gov.rs") ? '/procesuiraj-racun' : '/skeniraj';
            
            fetch(ruta, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, [ruta === '/skeniraj' ? 'tiketId' : 'url']: tiketId, aparatId })
            })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('status').innerText = "✅ APARAT POKRENUT!";
                } else {
                    document.getElementById('status').innerText = "❌ " + res.message;
                }
            })
            .catch(() => { document.getElementById('status').innerText = "❌ Greška na mreži"; });
        }

        function manualStart() {
            const code = document.getElementById('pfr-last').value;
            if(code.length < 4) return alert("Unesite bar 4 broja!");
            handleData(code);
        }

        // Start skenera sa pokušajem "poboljšanja" slike
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
